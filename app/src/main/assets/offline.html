<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>No Connection</title>
    <script src="https://kit.fontawesome.com/ae08452595.js" crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .icon {
        font-size: 80px;
        margin-bottom: 24px;
        opacity: 0.85;
        }

        .icon .fa-wifi {
        color: #4fc3f7;
        }

        .icon .fa-x {
        color: #ef5350;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #ffffff;
        }

        p {
            font-size: 16px;
            color: #9e9e9e;
            max-width: 280px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
<div class="icon"><i class="fa-solid fa-wifi"></i> <i class="fa-solid fa-x"></i></div>
<h1>No Internet Connection</h1>
<p>Please connect to a WiFi or cellular network and reopen the app.</p>
</body>
</html>
