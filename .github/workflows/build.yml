name: Build & Release StormView
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify Node and npm
        run: |
          echo "node: $(which node) — $(node --version)"
          echo "npm:  $(which npm) — $(npm --version)"

      - name: Write API keys to local.properties
        run: |
          echo "VITE_MAPTILER_KEY=${{ secrets.VITE_MAPTILER_KEY }}" >> local.properties
          echo "VITE_GOOGLE_POLLEN_KEY=${{ secrets.VITE_GOOGLE_POLLEN_KEY }}" >> local.properties
          echo "VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }}" >> local.properties

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Rename Debug APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/StormView-debug.apk

      - name: Set release tag
        id: tag
        run: |
          if [ "${{ github.ref_type }}" == "tag" ]; then
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "value=manual-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: StormView ${{ steps.tag.outputs.value }}
          body: |
            ## StormView ${{ steps.tag.outputs.value }}
            > ⚠️ This is a debug build — for personal use only.
            ### Installation
            1. Download `StormView-debug.apk` below
            2. Transfer to your Android device
            3. Open the file and tap Install
            4. If prompted, enable **Install unknown apps** for your file manager
          files: app/build/outputs/apk/debug/StormView-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
